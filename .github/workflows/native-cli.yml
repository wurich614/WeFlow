name: Native CLI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "resources/**"
      - "electron/assets/wasm/**"
      - ".github/workflows/native-cli.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "resources/**"
      - "electron/assets/wasm/**"
      - ".github/workflows/native-cli.yml"

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest           # x64 runner, native target
            target: x86_64-pc-windows-msvc
            artifact: weflow-windows-x64.exe
            binary: target/x86_64-pc-windows-msvc/release/weflow.exe
            run_tests: true

          - name: windows-arm64
            os: windows-latest           # x64 runner, cross-compiling to ARM64
            target: aarch64-pc-windows-msvc
            artifact: weflow-windows-arm64.exe
            binary: target/aarch64-pc-windows-msvc/release/weflow.exe
            run_tests: false             # cannot run ARM64 binaries on x64 runner

          - name: macos-arm64
            os: macos-latest             # macos-latest = Apple Silicon (arm64)
            target: aarch64-apple-darwin
            artifact: weflow-macos-arm64
            binary: target/aarch64-apple-darwin/release/weflow
            run_tests: true

          # Uncomment to add Intel Mac support:
          # - name: macos-x64
          #   os: macos-13               # last Intel Mac runner
          #   target: x86_64-apple-darwin
          #   artifact: weflow-macos-x64
          #   binary: target/x86_64-apple-darwin/release/weflow
          #   run_tests: true

          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: weflow-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/weflow
            run_tests: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # full history so build.rs git rev-parse works reliably

      - name: Install Rust toolchain + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Explicitly verify the MSVC ARM64 linker is present before spending time compiling
      - name: Verify MSVC ARM64 toolchain
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 `
            -property installationPath 2>$null
          if (-not $vsPath) {
            Write-Error "MSVC ARM64 toolchain not found. The windows-latest runner may lack VC.Tools.ARM64."
            exit 1
          }
          Write-Host "MSVC ARM64 toolchain found at: $vsPath"

      - uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --target ${{ matrix.target }}

      - name: Test (host target only)
        if: matrix.run_tests
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release -p weflow-cli --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30
